<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crumbz</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
</head>

<body>

<div class="cz">

  <nav class="cnav">
    <div class="cnav-logo" id="clogo">Crumbz</div>
    <ul class="cnav-links">
      <li><a onclick="goPage('order')" id="nl-order">Order Online</a></li>
      <li><a onclick="goPage('how')" id="nl-how">How to Order</a></li>
      <li><a onclick="goPage('sweets')" id="nl-sweets">Sweets</a></li>
      <li><a onclick="goPage('contact')" id="nl-contact">Contact</a></li>
    </ul>
    <div class="cnav-cart" onclick="goPage('cart')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="cbadge" id="cbadge">0</span>
    </div>
  </nav>

  <!-- HOME -->
  <div class="pg act" id="pg-home">
    <div class="hero"><h1>Crumbz</h1></div>
    <div class="hero-bot">
      <button class="btn-gs" onclick="goPage('order')">Get Started</button>
    </div>
  </div>

  <!-- ORDER ONLINE -->
  <div class="pg" id="pg-order">
    <div class="pink-bar"></div>
    <div class="order-wrap">
      <aside class="sidebar">
        <p class="sidebar-lbl">Sweet Baked Goods</p>
        <ul class="cat-list">
          <li class="act" onclick="showCat('custom',this)">Custom Cake</li>
          <li onclick="showCat('cake',this)">Cake</li>
          <li onclick="showCat('cookies',this)">Cookies</li>
          <li onclick="showCat('cinnamon',this)">Cinnamon Rolls</li>
        </ul>
      </aside>

      <main class="order-main">
        <!-- (ALL YOUR CONTENT STAYS EXACTLY THE SAME HERE) -->
      </main>
    </div>
  </div>

  <!-- ALL OTHER PAGES (UNCHANGED) -->
  <div class="pg" id="pg-cart"></div>
  <div class="pg" id="pg-how"></div>
  <div class="pg" id="pg-sweets"></div>
  <div class="pg" id="pg-contact"></div>

</div>

<!-- DELETE POPUP -->
<div class="delete-overlay" id="delete-overlay">
  <div class="delete-box">
    <p>Are you sure you want<br/>to delete this order?</p>
    <div class="delete-actions">
      <button onclick="cancelDelete()">No</button>
      <button onclick="confirmDelete()">Yes</button>
    </div>
  </div>
</div>

<!-- ✅ SOCIAL BAR (THIS IS THE CORRECT PLACE) -->
<div class="social-bar">
  <a href="#" aria-label="Twitter">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622Z"/>
    </svg>
  </a>

  <a href="#" aria-label="Instagram">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="2" y="2" width="20" height="20" rx="5"></rect>
      <circle cx="12" cy="12" r="4.5"></circle>
      <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"></circle>
    </svg>
  </a>

  <a href="#" aria-label="Discord">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25A19.736 19.736 0 0 0 3.677 4.37C.533 9.046-.32 13.58.099 18.057a19.9 19.9 0 0 0 5.993 3.03c.2-.43.38-.88.54-1.35a13.107 13.107 0 0 1-1.872-.892 10.2 10.2 0 0 0 .372-.292c3.928 1.793 8.18 1.793 12.062 0 .12.098.246.198.373.292a12.299 12.299 0 0 1-1.873.892c.16.47.34.92.54 1.35a19.839 19.839 0 0 0 5.999-3.03c.5-5.177-.838-9.674-3.549-13.66Z"/>
    </svg>
  </a>
</div>

<script src="javascript/main.js"></script>
</body>
</html>
